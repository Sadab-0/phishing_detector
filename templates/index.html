<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Phishing Detector</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        textarea { width: 100%; height: 200px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: vertical; }
        button { display: block; width: 100%; padding: 10px; margin-top: 15px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #004494; }
        .result { margin-top: 20px; text-align: center; font-size: 20px; font-weight: bold; padding: 10px; border-radius: 4px; }
        .safe { background-color: #d4edda; color: #155724; }
        .phishing { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h2>AI Phishing Email Detector</h2>
        <form method="POST">
            <textarea name="email_content" placeholder="Paste the email content here..." required>{{ email_content }}</textarea>
            <button type="submit">Analyze Email</button>
        </form>
        
        {% if prediction %}
            <div class="result {% if 'Phishing' in prediction %}phishing{% else %}safe{% endif %}">
                {{ prediction }}
            </div>
        {% endif %}
    </div>
</body>
</html>
